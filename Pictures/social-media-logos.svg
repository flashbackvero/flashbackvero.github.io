    <rect x="640" y="301" width="202" height="202" rx="58" fill="none" stroke="#ffffff" stroke-width="24" filter="url(#glow)"/>
    <circle cx="741" cy="402" r="54" fill="none" stroke="#ffffff" stroke-width="24"/>
    <circle cx="815" cy="328" r="18" fill="#ffffff"/>
    <text x="741" y="668" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="54">Instagram</text>
