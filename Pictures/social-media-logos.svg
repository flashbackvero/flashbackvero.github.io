<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1050 1000" role="img" aria-label="YouTube and Instagram social media logos">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151515"/>
      <stop offset="0.52" stop-color="#27231f"/>
      <stop offset="1" stop-color="#0d0d0d"/>
    </linearGradient>
    <radialGradient id="insta" cx="28%" cy="18%" r="92%">
      <stop offset="0" stop-color="#ffd86f"/>
      <stop offset="0.28" stop-color="#ff7a18"/>
      <stop offset="0.55" stop-color="#e1306c"/>
      <stop offset="0.78" stop-color="#833ab4"/>
