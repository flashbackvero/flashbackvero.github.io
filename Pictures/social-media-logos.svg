  <rect width="1050" height="1000" rx="44" fill="url(#bg)"/>
  <path d="M70 190c130-76 260-82 390-18 114 56 214 57 325 4 74-35 138-37 194-7v657c-111-58-218-55-322 9-119 74-247 76-384 7-80-40-148-48-203-26z" fill="#fffdf5" opacity="0.055"/>
  <g filter="url(#shadow)">
    <rect x="135" y="226" width="352" height="352" rx="76" fill="#ffffff"/>
    <rect x="176" y="316" width="270" height="172" rx="48" fill="#ff0033"/>
    <path d="M288 355v94l84-47z" fill="#ffffff"/>
    <text x="311" y="668" text-anchor="middle" fill="#ffffff" font-family="Arial Black, Impact, sans-serif" font-size="54">YouTube</text>
