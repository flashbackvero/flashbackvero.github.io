  <text x="525" y="805" text-anchor="middle" fill="#ffc20f" font-family="Arial Black, Impact, sans-serif" font-size="68">FOLLOW VERO FLASHBACK</text>
  <text x="525" y="867" text-anchor="middle" fill="#ffffff" opacity="0.86" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="700">finds, booth updates, and videos</text>
