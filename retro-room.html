<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Interactive Retro Museum for Vero Flashback with clickable objects from the final museum room artwork."
    />
    <title>Interactive Retro Museum | Vero Flashback</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-width: 320px;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #030303;
        color: #f7f0df;
        font-family: Arial, Helvetica, sans-serif;
        scrollbar-width: none;
      }

      html::-webkit-scrollbar,
      body::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button {
        color: inherit;
        font: inherit;
      }

      .museum-page {
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        background: #030303;
      }

      .scene-shell {
        position: relative;
        display: grid;
        place-items: center;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        background: #030303;
        scrollbar-width: none;
      }

      .scene-shell::-webkit-scrollbar,
      .mobile-item-list::-webkit-scrollbar,
      .item-modal::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }

      .museum-stage {
        position: relative;
        width: min(100vw, calc(100vh * 1672 / 941));
        height: min(100vh, calc(100vw * 941 / 1672));
        isolation: isolate;
      }

      .museum-bg {
        position: absolute;
        inset: 0;
        z-index: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        user-select: none;
        pointer-events: none;
      }

      .room-effect {
        position: absolute;
        z-index: 1;
        pointer-events: none;
      }

      .crt-static-effect {
        left: 3.12%;
        top: 66.82%;
        width: 17.72%;
        height: 23.45%;
        overflow: hidden;
        border-radius: 11% 9% 13% 10% / 13% 12% 15% 13%;
        clip-path: polygon(5.5% 1%, 99% 2.5%, 91.5% 94.8%, 0.5% 98.5%, 2.2% 51%);
        background:
          radial-gradient(ellipse at 46% 47%, rgba(210, 228, 242, 0.18), rgba(72, 91, 108, 0.12) 57%, rgba(0, 0, 0, 0) 78%),
          repeating-radial-gradient(circle at 43% 45%, rgba(250, 253, 255, 0.2) 0 0.8px, rgba(33, 41, 50, 0.16) 0.9px 1.8px),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.08) 0 1px, rgba(0, 0, 0, 0.06) 1px 4px);
        -webkit-mask-image: radial-gradient(ellipse at 50% 50%, #000 62%, rgba(0, 0, 0, 0.78) 79%, transparent 100%);
        mask-image: radial-gradient(ellipse at 50% 50%, #000 62%, rgba(0, 0, 0, 0.78) 79%, transparent 100%);
        mix-blend-mode: screen;
        opacity: 0.36;
        filter: contrast(1.36) brightness(1.04) saturate(0.58);
        animation: crtStaticShift 620ms steps(5, end) infinite, crtGlowPulse 3.6s ease-in-out infinite;
      }

      .crt-static-effect::before {
        content: "";
        position: absolute;
        inset: -8%;
        background:
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.06) 0 1px, rgba(25, 31, 38, 0.08) 1px 2px),
          radial-gradient(circle at 44% 42%, rgba(220, 232, 242, 0.14), transparent 58%);
        opacity: 0.34;
        animation: crtNoiseJump 900ms steps(5, end) infinite;
      }

      .crt-static-effect::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.12), transparent 28%, rgba(255, 255, 255, 0.04) 58%, transparent 78%),
          repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.06) 0 1px, transparent 1px 5px);
        opacity: 0.42;
        animation: crtScanlineDrift 5.2s linear infinite;
      }

      .neon-sign-effect {
        left: 44.9%;
        top: 3.2%;
        width: 27.9%;
        height: 29.6%;
        border-radius: 2%;
        background:
          radial-gradient(ellipse at 50% 49%, rgba(255, 152, 0, 0.28), transparent 58%),
          linear-gradient(90deg, transparent, rgba(255, 199, 66, 0.1), transparent);
        mix-blend-mode: screen;
        opacity: 0.62;
        filter: blur(1.1px) saturate(1.28);
        animation: neonBreath 3.8s ease-in-out infinite, neonBlink 9.5s steps(1, end) infinite;
      }

      .neon-blue-line {
        position: absolute;
        height: 1.08%;
        border-radius: 999px;
        background:
          linear-gradient(180deg, rgba(201, 247, 255, 0.96), rgba(40, 170, 255, 0.9) 54%, rgba(38, 87, 255, 0.72));
        box-shadow:
          0 0 5px rgba(226, 255, 255, 0.92),
          0 0 10px rgba(40, 170, 255, 0.95),
          0 0 24px rgba(40, 170, 255, 0.68),
          0 0 48px rgba(40, 170, 255, 0.32);
        mix-blend-mode: screen;
        opacity: 0.88;
        animation: neonTubePulse 3.2s ease-in-out infinite, neonTubeBlink 9.5s steps(1, end) infinite;
      }

      .neon-blue-line.top-line {
        left: 45.38%;
        top: 1.95%;
        width: 27.18%;
      }

      .neon-blue-line.bottom-line {
        left: 45.46%;
        top: 30.5%;
        width: 26.85%;
      }

      .neon-letter-glow {
        left: 44.45%;
        top: 3.35%;
        width: 28.48%;
        height: 26.3%;
        border-radius: 3%;
        background:
          radial-gradient(ellipse at 51% 19%, rgba(255, 206, 67, 0.34), transparent 32%),
          radial-gradient(ellipse at 51% 49%, rgba(255, 143, 0, 0.44), transparent 34%),
          radial-gradient(ellipse at 51% 78%, rgba(255, 143, 0, 0.42), transparent 36%);
        mix-blend-mode: screen;
        opacity: 0.52;
        filter: blur(1.3px) saturate(1.45);
        animation: neonLetterPulse 4.6s ease-in-out infinite, neonTinyFlicker 11s steps(1, end) infinite;
      }

      @keyframes crtStaticShift {
        0% {
          background-position: 0 0, 0 0, 0 0;
        }
        25% {
          background-position: 7px -5px, 0 2px, 12px 4px;
        }
        50% {
          background-position: -9px 6px, 0 -1px, -8px 11px;
        }
        75% {
          background-position: 4px 10px, 0 3px, 6px -7px;
        }
        100% {
          background-position: -3px -8px, 0 0, -10px 5px;
        }
      }

      @keyframes crtNoiseJump {
        0% {
          transform: translate3d(-1%, -1%, 0);
        }
        35% {
          transform: translate3d(2%, 1%, 0);
        }
        70% {
          transform: translate3d(-2%, 2%, 0);
        }
        100% {
          transform: translate3d(1%, -2%, 0);
        }
      }

      @keyframes crtGlowPulse {
        0%,
        100% {
          opacity: 0.36;
        }
        50% {
          opacity: 0.5;
        }
      }

      @keyframes crtScanlineDrift {
        0% {
          background-position: 0 0, 0 0;
        }
        100% {
          background-position: 8px 0, 0 18px;
        }
      }

      @keyframes neonBreath {
        0%,
        100% {
          opacity: 0.58;
          filter: blur(1px) saturate(1.15);
        }
        48% {
          opacity: 0.88;
          filter: blur(1.4px) saturate(1.55);
        }
      }

      @keyframes neonBlink {
        0%,
        67%,
        70%,
        100% {
          visibility: visible;
        }
        68%,
        69% {
          visibility: hidden;
        }
      }

      @keyframes neonTubePulse {
        0%,
        100% {
          opacity: 0.72;
          filter: saturate(1.12);
        }
        48% {
          opacity: 1;
          filter: saturate(1.5);
        }
      }

      @keyframes neonTubeBlink {
        0%,
        67%,
        70%,
        100% {
          visibility: visible;
        }
        68%,
        69% {
          visibility: hidden;
        }
      }

      @keyframes neonLetterPulse {
        0%,
        100% {
          opacity: 0.42;
        }
        45% {
          opacity: 0.66;
        }
      }

      @keyframes neonTinyFlicker {
        0%,
        64%,
        66%,
        100% {
          visibility: visible;
        }
        65% {
          visibility: hidden;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .crt-static-effect,
        .crt-static-effect::before,
        .crt-static-effect::after,
        .neon-sign-effect,
        .neon-blue-line,
        .neon-letter-glow {
          animation: none;
        }
      }

      .hotspot-layer {
        position: absolute;
        inset: 0;
        z-index: 2;
      }

      .back-home-link {
        position: fixed;
        top: 14px;
        left: 16px;
        z-index: 8;
        padding: 8px 11px;
        border: 1px solid rgba(40, 170, 255, 0.82);
        border-radius: 4px;
        background: rgba(3, 3, 3, 0.72);
        color: #0051ba;
        font-family: "Arial Narrow", Impact, sans-serif;
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-transform: uppercase;
        box-shadow: 0 0 16px rgba(40, 170, 255, 0.34), 0 0 32px rgba(40, 170, 255, 0.18);
        text-shadow: 0 0 9px rgba(40, 170, 255, 0.72);
      }

      .back-home-link:hover,
      .back-home-link:focus-visible {
        background: rgba(40, 170, 255, 0.16);
        outline: none;
      }

      .hotspot {
        position: absolute;
        z-index: 3;
        left: var(--x);
        top: var(--y);
        width: var(--w);
        height: var(--h);
        border: 0;
        border-radius: 8px;
        background: transparent;
        cursor: pointer;
        transform: translateZ(0);
      }

      .hotspot::before {
        content: "";
        position: absolute;
        inset: -5px;
        border: 2px solid rgba(40, 170, 255, 0);
        border-radius: inherit;
        background: rgba(40, 170, 255, 0);
        opacity: 0;
        transition: opacity 150ms ease, background 150ms ease, border-color 150ms ease, box-shadow 150ms ease;
      }

      .hotspot:hover::before,
      .hotspot:focus-visible::before {
        border-color: rgba(40, 170, 255, 0.9);
        background: rgba(40, 170, 255, 0.12);
        box-shadow: 0 0 22px rgba(40, 170, 255, 0.62), 0 0 42px rgba(40, 170, 255, 0.22);
        opacity: 1;
      }

      .hotspot:focus-visible {
        outline: none;
      }

      .hotspot-label {
        position: absolute;
        left: 50%;
        bottom: calc(100% + 8px);
        z-index: 2;
        min-width: max-content;
        max-width: 240px;
        padding: 6px 9px;
        border: 1px solid rgba(40, 170, 255, 0.82);
        border-radius: 5px;
        background: rgba(3, 3, 3, 0.88);
        color: #ffffff;
        font-family: "Arial Narrow", Impact, sans-serif;
        font-size: 14px;
        font-weight: 900;
        line-height: 1;
        opacity: 0;
        text-transform: uppercase;
        transform: translate(-50%, 6px);
        transition: opacity 150ms ease, transform 150ms ease;
        pointer-events: none;
        white-space: nowrap;
      }

      .hotspot:hover .hotspot-label,
      .hotspot:focus-visible .hotspot-label {
        opacity: 1;
        transform: translate(-50%, 0);
      }

      .screen-reader-text {
        position: absolute;
        width: 1px;
        height: 1px;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
      }

      .mobile-item-list {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 12;
        display: none;
        gap: 10px;
        overflow-x: auto;
        padding: 10px 12px;
        border-top: 1px solid rgba(40, 170, 255, 0.42);
        background: rgba(3, 3, 3, 0.88);
        backdrop-filter: blur(12px);
      }

      .mobile-item-list button {
        flex: 0 0 auto;
        min-height: 38px;
        border: 1px solid rgba(40, 170, 255, 0.72);
        border-radius: 999px;
        padding: 0 12px;
        background: rgba(0, 0, 0, 0.66);
        color: #ffffff;
        cursor: pointer;
        font-family: "Arial Narrow", Impact, sans-serif;
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 90;
        display: none;
        place-items: center;
        padding: clamp(12px, 3vw, 28px);
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(1px);
      }

      .modal-backdrop.open {
        display: grid;
      }

      .rubiks-game-backdrop {
        position: fixed;
        inset: 0;
        z-index: 110;
        display: none;
        place-items: center;
        padding: 18px;
        background: rgba(0, 0, 0, 0.78);
      }

      .rubiks-game-backdrop.open {
        display: grid;
      }

      .rubiks-game-window {
        width: min(900px, 100%);
        height: min(820px, calc(100vh - 36px));
        overflow: hidden;
        border: 1px solid rgba(139, 230, 212, 0.45);
        border-radius: 10px;
        background: transparent;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.62), 0 0 28px rgba(82, 214, 196, 0.2);
      }

      .rubiks-game-frame {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: transparent;
      }

      .item-modal {
        position: relative;
        isolation: isolate;
        width: min(870px, 100%);
        height: min(590px, calc(100dvh - 32px));
        max-height: calc(100dvh - 32px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        scrollbar-width: none;
        border: 2px solid rgba(57, 34, 17, 0.78);
        border-radius: 4px;
        background:
          radial-gradient(circle at 18% 22%, rgba(255, 247, 214, 0.52), transparent 31%),
          radial-gradient(circle at 84% 76%, rgba(114, 67, 28, 0.18), transparent 34%),
          linear-gradient(180deg, rgba(238, 211, 157, 0.96), rgba(202, 166, 106, 0.96));
        color: #1f150b;
        box-shadow:
          0 28px 80px rgba(0, 0, 0, 0.72),
          inset 0 0 0 7px rgba(107, 65, 29, 0.18),
          inset 0 0 46px rgba(58, 30, 12, 0.2);
      }

      .item-modal::before {
        content: "";
        position: absolute;
        inset: 10px;
        z-index: -1;
        border: 1px solid rgba(72, 43, 21, 0.4);
        border-radius: 3px;
        background-image:
          linear-gradient(90deg, rgba(58, 30, 12, 0.06) 1px, transparent 1px),
          linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 34px 34px, 100% 29px;
        opacity: 0.55;
        pointer-events: none;
      }

      .modal-head {
        position: relative;
        display: flex;
        align-items: start;
        justify-content: space-between;
        gap: 18px;
        padding: 14px 24px 6px;
      }

      .modal-head::after {
        content: "";
        position: absolute;
        left: 28px;
        right: 82px;
        bottom: 2px;
        height: 3px;
        background:
          linear-gradient(90deg, rgba(139, 31, 22, 0.88), rgba(139, 31, 22, 0.52), transparent);
        transform: rotate(-0.55deg);
      }

      .modal-head h2 {
        margin: 0;
        max-width: 760px;
        color: #12100d;
        font-family: "Trebuchet MS", "Arial Narrow", Impact, sans-serif;
        font-size: clamp(24px, 3.5vw, 42px);
        font-style: italic;
        font-weight: 900;
        line-height: 0.98;
        text-transform: uppercase;
        text-shadow: 0 1px 0 rgba(255, 244, 211, 0.7);
        transform: rotate(-1deg);
      }

      .close-modal {
        flex: 0 0 auto;
        width: 36px;
        height: 36px;
        border: 3px solid #14100a;
        border-radius: 3px;
        background: rgba(222, 190, 129, 0.74);
        color: #14100a;
        cursor: pointer;
        font-size: 23px;
        font-weight: 900;
        line-height: 1;
        box-shadow: inset 0 0 0 1px rgba(255, 244, 211, 0.35);
        transition: background 160ms ease, color 160ms ease, transform 160ms ease;
      }

      .close-modal:hover,
      .close-modal:focus-visible {
        background: #17120c;
        color: #fff0cf;
        outline: none;
        transform: rotate(2deg) scale(1.03);
      }

      .modal-grid {
        display: grid;
        grid-template-columns: minmax(270px, 0.95fr) minmax(290px, 1.05fr);
        gap: 16px;
        min-height: 0;
        padding: 10px 24px 18px;
      }

      .modal-visual {
        position: relative;
        display: grid;
        place-items: stretch;
        overflow: visible;
        min-height: 0;
        padding: 10px;
        border: 2px solid rgba(111, 73, 36, 0.42);
        border-radius: 2px;
        background: rgba(255, 239, 194, 0.54);
        box-shadow:
          0 14px 28px rgba(70, 39, 16, 0.22),
          inset 0 0 24px rgba(86, 52, 23, 0.16);
        transform: rotate(-0.35deg);
      }

      .modal-visual.has-play {
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 14px;
      }

      .modal-visual::before,
      .modal-visual::after {
        content: "";
        position: absolute;
        z-index: 4;
        width: 96px;
        height: 34px;
        background:
          linear-gradient(90deg, rgba(132, 93, 52, 0.12), rgba(255, 239, 191, 0.52), rgba(95, 58, 30, 0.14));
        box-shadow: 0 2px 9px rgba(44, 24, 10, 0.16);
        opacity: 0.82;
        pointer-events: none;
      }

      .modal-visual::before {
        top: -12px;
        right: 24px;
        transform: rotate(4deg);
      }

      .modal-visual::after {
        bottom: -13px;
        left: 26px;
        transform: rotate(-8deg);
      }

      .modal-crop {
        width: 100%;
        height: 100%;
        min-height: 0;
        overflow: hidden;
        border-radius: 2px;
        background-image: url("./Pictures/interactive museum 1.4 edited before shelves.png");
        background-repeat: no-repeat;
        background-size: var(--zoom, 340%);
        background-position: var(--focus, center);
        filter: sepia(0.08) contrast(1.04) saturate(0.95);
      }

      .modal-photo-card {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(111, 73, 36, 0.36);
        border-radius: 2px;
        background:
          radial-gradient(circle at 50% 38%, rgba(255, 252, 236, 0.94), rgba(242, 224, 179, 0.78) 56%, rgba(205, 170, 105, 0.34)),
          linear-gradient(180deg, rgba(255, 248, 224, 0.8), rgba(220, 184, 116, 0.34));
        box-shadow: inset 0 0 30px rgba(85, 51, 22, 0.13);
      }

      .modal-photo-card::before {
        content: "";
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(108, 71, 36, 0.18);
        pointer-events: none;
      }

      .item-photo {
        position: relative;
        z-index: 1;
        width: min(90%, 470px);
        max-height: min(238px, 34dvh);
        object-fit: contain;
        filter: drop-shadow(0 18px 20px rgba(54, 31, 12, 0.27));
      }

      .item-play-button {
        justify-self: center;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 132px;
        min-height: 38px;
        border: 2px solid #17120c;
        border-radius: 4px;
        background:
          linear-gradient(180deg, rgba(255, 227, 116, 0.98), rgba(204, 151, 42, 0.98));
        color: #17120c;
        cursor: pointer;
        font-family: "Arial Narrow", Impact, sans-serif;
        font-size: 21px;
        font-weight: 900;
        line-height: 1;
        text-transform: uppercase;
        box-shadow: 0 8px 17px rgba(70, 39, 16, 0.22);
        transform: rotate(-1deg);
      }

      .item-play-button:hover,
      .item-play-button:focus-visible {
        outline: none;
        filter: saturate(1.1) contrast(1.04);
        transform: rotate(-1deg) translateY(-1px);
      }

      .console-gallery {
        position: relative;
        display: grid;
        grid-template-rows: minmax(0, 1fr) 44px;
        gap: 6px;
        min-height: 0;
        padding: 10px 10px 7px;
        background: transparent;
      }

      .console-stage {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 0;
        overflow: hidden;
        border: 1px solid rgba(111, 73, 36, 0.32);
        background: rgba(255, 246, 220, 0.46);
      }

      .console-image {
        width: min(92%, 470px);
        max-height: 270px;
        object-fit: contain;
        filter: drop-shadow(0 16px 20px rgba(52, 31, 12, 0.26));
      }

      .console-arrow {
        position: absolute;
        bottom: 1px;
        z-index: 2;
        display: grid;
        place-items: center;
        width: 38px;
        aspect-ratio: 1;
        border: 0;
        border-radius: 0;
        background: transparent;
        color: #12100d;
        cursor: pointer;
        font-size: 38px;
        font-weight: 800;
        line-height: 1;
        text-shadow: 0 1px 0 rgba(255, 244, 211, 0.7);
        transition: color 160ms ease, transform 160ms ease;
      }

      .console-arrow:hover,
      .console-arrow:focus-visible {
        color: #0051ba;
        outline: none;
        transform: scale(1.08);
      }

      .console-arrow.prev {
        left: 25%;
      }

      .console-arrow.next {
        right: 25%;
      }

      .console-count {
        justify-self: center;
        align-self: center;
        color: #0051ba;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 21px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .modal-copy {
        display: grid;
        align-content: start;
        gap: 8px;
        min-height: 0;
        overflow: hidden;
        padding-top: 4px;
      }

      .modal-copy p {
        margin: 0;
        color: #20170e;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.38;
      }

      #modalDescription {
        display: -webkit-box;
        padding: 0 4px 8px;
        overflow: hidden;
        border-bottom: 2px solid rgba(35, 24, 15, 0.72);
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
      }

      .price-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .price-card {
        overflow: hidden;
        border: 2px solid #1c140c;
        border-radius: 4px;
        padding: 0 10px 10px;
        background: rgba(245, 224, 176, 0.5);
        text-align: center;
      }

      .price-card span {
        display: block;
        margin: 0 -10px 8px;
        padding: 7px 4px 6px;
        background: #17120c;
        color: #fff0cf;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .price-card strong {
        display: block;
        color: #0051ba;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: clamp(21px, 2.3vw, 29px);
        font-style: normal;
        font-weight: 800;
        letter-spacing: 0;
        line-height: 1.12;
        text-transform: none;
      }

      .timeline {
        display: grid;
        gap: 0;
        margin: 0;
        padding: 0;
        list-style: none;
        overflow: hidden;
      }

      .timeline li {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 8px;
        align-items: start;
        border-top: 1px solid rgba(116, 43, 28, 0.5);
        padding: 6px 4px 6px;
        color: #21170d;
        font-family: "Trebuchet MS", Arial, sans-serif;
        font-size: 13px;
        font-weight: 700;
        line-height: 1.38;
      }

      .timeline b {
        color: #0051ba;
        font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
        transform: rotate(-1.5deg);
      }

      .fact {
        border-top: 1px solid rgba(35, 24, 15, 0.46);
        padding: 7px 4px 0;
        background: transparent;
        color: #4b2b15;
        font-size: 16px;
        font-style: italic;
        line-height: 1.42;
      }

      .modal-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 16px;
        align-items: center;
        padding-top: 4px;
      }

      .source-note {
        color: #0051ba;
        font-size: 13px;
        font-weight: 800;
        text-transform: uppercase;
      }

      @media (max-width: 780px) {
        .scene-shell {
          padding-bottom: 58px;
        }

        .mobile-item-list {
          display: flex;
        }

        .modal-grid {
          grid-template-columns: 1fr;
          gap: 22px;
          padding: 12px 20px 24px;
        }

        .modal-head {
          padding: 24px 20px 4px;
        }

        .modal-head::after {
          left: 20px;
          right: 74px;
        }

        .modal-head h2 {
          font-size: clamp(30px, 11vw, 46px);
        }

        .modal-visual,
        .modal-crop {
          min-height: 260px;
        }

        .modal-photo-card {
          min-height: 232px;
        }

        .item-photo {
          max-height: 228px;
        }

        .console-gallery {
          min-height: 260px;
          grid-template-rows: minmax(210px, 1fr) auto;
        }

        .console-stage {
          min-height: 210px;
        }

        .console-image {
          width: min(96%, 390px);
          max-height: 235px;
        }

        .price-grid {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .timeline li {
          grid-template-columns: 74px 1fr;
          gap: 10px;
        }

        .console-arrow.prev {
          left: 18%;
        }

        .console-arrow.next {
          right: 18%;
        }
      }

      function makeHotspot(key, label, x, y, w, h) {
        var button = document.createElement("button");
        var text = document.createElement("span");
        var tooltip = document.createElement("span");
        button.className = "hotspot";
        button.type = "button";
        button.setAttribute("data-item", key);
        button.setAttribute("aria-label", label);
        button.style.setProperty("--x", x + "%");
        button.style.setProperty("--y", y + "%");
        button.style.setProperty("--w", w + "%");
        button.style.setProperty("--h", h + "%");
        text.className = "screen-reader-text";
        text.textContent = label;
        tooltip.className = "hotspot-label";
        tooltip.textContent = label;
        button.appendChild(text);
        button.appendChild(tooltip);
        button.addEventListener("click", function () {
          openItem(key);
        });
        return button;
      }

      function createCrop(item) {
        var crop = document.createElement("div");
        crop.className = "modal-crop";
        crop.style.setProperty("--focus", item.focus || "center");
        crop.style.setProperty("--zoom", item.zoom || "340%");
        return crop;
      }

      function createPhoto(item) {
        var frame = document.createElement("figure");
        var image = document.createElement("img");
        frame.className = "modal-photo-card";
        image.className = "item-photo";
        image.src = item.image;
        image.alt = item.title + " reference photo";
        image.loading = "eager";
        frame.appendChild(image);
        return frame;
      }

      function createVisual(item) {
        return item.image ? createPhoto(item) : createCrop(item);
      }

      function createPlayButton(item) {
        var button = document.createElement("button");
        button.className = "item-play-button";
        button.type = "button";
        button.textContent = "Play";
        button.setAttribute("aria-label", item.playLabel || "Play interactive exhibit");
        button.addEventListener("click", function () {
          openPlayableModal(item.playUrl, item.playLabel || item.title);
        });
        return button;
      }

      function releaseDateFor(item) {
        if (item.release) return item.release;
        if (item.released) return item.released;
        if (item.timeline && item.timeline.length) return item.timeline[0][0];
        return "Date varies";
      }

      function setModalCopy(item) {
        modalTitle.textContent = item.title;
        modalDescription.textContent = item.description;
        modalRetail.textContent = item.retail;
        modalReleased.textContent = releaseDateFor(item);
        modalFact.textContent = item.fact || "";
        modalFact.hidden = !item.fact;
        modalSource.textContent = item.source || "";
        modalSource.hidden = !item.source;
        modalActions.hidden = !item.source;
        modalTimeline.innerHTML = "";

        item.timeline.slice(0, 2).forEach(function (entry) {
          var li = document.createElement("li");
          var year = document.createElement("b");
          var text = document.createElement("span");
          year.textContent = entry[0];
          text.textContent = entry[1];
          li.appendChild(year);
          li.appendChild(text);
          modalTimeline.appendChild(li);
        });
      }

      function renderConsoleSlide() {
        var consoleItem = consoleItems[activeConsoleIndex];
        setModalCopy({
          title: consoleItem.title,
          description: consoleCardDescriptions[consoleItem.key] || consoleItem.description,
          retail: consoleItem.retail,
          release: consoleItem.release,
          timeline: consoleItem.timeline,
          fact: "",
          source: ""
        });

        var image = modalVisual.querySelector(".console-image");
        var count = modalVisual.querySelector(".console-count");
        if (image) {
          image.src = consoleItem.image;
          image.alt = consoleItem.title + " stock image";
        }
        if (count) {
          count.textContent = activeConsoleIndex + 1 + " / " + consoleItems.length;
        }
      }

      function createConsoleGallery() {
        var gallery = document.createElement("div");
        var stage = document.createElement("div");
        var prev = document.createElement("button");
        var next = document.createElement("button");
        var image = document.createElement("img");
        var count = document.createElement("div");

        gallery.className = "console-gallery";
        stage.className = "console-stage";
        prev.className = "console-arrow prev";
        next.className = "console-arrow next";
        image.className = "console-image";
        count.className = "console-count";

        prev.type = "button";
        next.type = "button";
        prev.setAttribute("aria-label", "Previous console");
        next.setAttribute("aria-label", "Next console");
        prev.textContent = "<";
        next.textContent = ">";

        prev.addEventListener("click", function () {
          activeConsoleIndex = (activeConsoleIndex + consoleItems.length - 1) % consoleItems.length;
          renderConsoleSlide();
        });
        next.addEventListener("click", function () {
          activeConsoleIndex = (activeConsoleIndex + 1) % consoleItems.length;
          renderConsoleSlide();
        });

        stage.appendChild(prev);
        stage.appendChild(image);
        stage.appendChild(next);
        gallery.appendChild(stage);
        gallery.appendChild(count);
        return gallery;
      }

      function openConsoleGallery(startKey) {
        var startIndex = consoleItems.findIndex(function (consoleItem) {
          return consoleItem.key === startKey;
        });
        activeConsoleIndex = startIndex >= 0 ? startIndex : 0;
        lastFocus = document.activeElement;
        modalVisual.innerHTML = "";
        modalVisual.classList.remove("has-play");
        modalVisual.appendChild(createConsoleGallery());
        renderConsoleSlide();
        modal.classList.add("open");
        closeModal.focus();
      }

      function openPlayableModal(url, title) {
        lastFocus = document.activeElement;
        rubiksGameFrame.title = title || "Playable interactive exhibit";
        rubiksGameFrame.src = url;
        rubiksGameModal.classList.add("open");
      }

      function closePlayableModal() {
        rubiksGameModal.classList.remove("open");
        rubiksGameFrame.src = "about:blank";
        if (lastFocus && typeof lastFocus.focus === "function") {
          lastFocus.focus();
        }
      }

      function openItem(key) {
        var item = items[key];
        if (!item) return;

        if (key === "gameConsoles" || key === "nes" || key === "gamecube" || key === "n64") {
          openConsoleGallery(key === "gameConsoles" ? "nes" : key);
          return;
        }

        lastFocus = document.activeElement;
        var cardItem = Object.assign({}, item, {
          description: cardDescriptions[key] || item.description
        });
        modalVisual.innerHTML = "";
        modalVisual.classList.toggle("has-play", !!cardItem.playUrl);
        modalVisual.appendChild(createVisual(cardItem));
        if (cardItem.playUrl) {
          modalVisual.appendChild(createPlayButton(cardItem));
        }
        setModalCopy(cardItem);

        modal.classList.add("open");
        closeModal.focus();
      }

      function closeItem() {
        modal.classList.remove("open");
        modalVisual.classList.remove("has-play");
        if (lastFocus && typeof lastFocus.focus === "function") {
          lastFocus.focus();
        }
      }

      hotspots.forEach(function (spot) {
        hotspotLayer.appendChild(makeHotspot(spot[0], spot[1], spot[2], spot[3], spot[4], spot[5]));
      });

      document.querySelectorAll("[data-open-item]").forEach(function (button) {
        button.addEventListener("click", function () {
          openItem(button.getAttribute("data-open-item"));
        });
      });

      hotspots.forEach(function (spot) {
        var key = spot[0];
        var button = document.createElement("button");
        button.type = "button";
        button.textContent = items[key].title;
        button.addEventListener("click", function () {
          openItem(key);
        });
        mobileList.appendChild(button);
      });

      closeModal.addEventListener("click", closeItem);
      modal.addEventListener("click", function (event) {
        if (event.target === modal) closeItem();
      });
      rubiksGameModal.addEventListener("click", function (event) {
        if (event.target === rubiksGameModal) closePlayableModal();
      });
      window.addEventListener("message", function (event) {
        if (event.data && (event.data.type === "rubiks-cube-close" || event.data.type === "plasma-ball-close")) {
          closePlayableModal();
        }
      });
      document.addEventListener("keydown", function (event) {
        if (event.key === "Escape" && modal.classList.contains("open")) {
          closeItem();
        }
        if (event.key === "Escape" && rubiksGameModal.classList.contains("open")) {
          closePlayableModal();
        }
      });
