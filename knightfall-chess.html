<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Knightfall Chess, a playable 3D chess game with easy, mid, and pro computer levels." />
    <title>Knightfall Chess | Vero Flashback</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #130e28;
        --panel: #201946;
        --panel-soft: #2a2154;
        --line: rgba(255, 255, 255, 0.11);
        --muted: #aaa3cc;
        --ivory: #f2ebdc;
        --brass: #c9a45d;
        --teal: #b48bea;
        --danger: #df665b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-width: 320px;
        min-height: 100%;
        margin: 0;
        background: #171132;
        color: var(--ivory);
        font-family: Inter, Arial, Helvetica, sans-serif;
      }

      body {
        overflow: hidden;
      }

      button {
        font: inherit;
      }

      .app-shell {
        width: 100%;
        height: 100dvh;
        min-height: 560px;
        display: grid;
        grid-template-rows: 68px minmax(0, 1fr);
        overflow: hidden;
        background: var(--ink);
      }

      .topbar {
        position: relative;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 0 18px 0 20px;
        border-bottom: 1px solid var(--line);
        background: rgba(26, 19, 52, 0.96);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        display: grid;
        place-items: center;
        border: 1px solid rgba(201, 164, 93, 0.48);
        border-radius: 6px;
        background: #241c4a;
        color: var(--brass);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 27px;
        line-height: 1;
        box-shadow: inset 0 0 18px rgba(201, 164, 93, 0.08);
      }

      .brand-copy {
        min-width: 0;
      }

      .brand-copy h1 {
        margin: 0;
        overflow: hidden;
        color: #f8f4eb;
        font-family: "Arial Narrow", Arial, Helvetica, sans-serif;
        font-size: 23px;
        font-weight: 900;
        letter-spacing: 0;
        line-height: 1;
        text-overflow: ellipsis;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .brand-copy span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .icon-button {
        position: relative;
        width: 38px;
        height: 38px;
        display: grid;
        place-items: center;
        padding: 0;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #221b46;
        color: #e5e8e5;
        cursor: pointer;
        transition: border-color 150ms ease, color 150ms ease, transform 150ms ease;
      }

      .icon-button:hover,
      .icon-button:focus-visible {
        border-color: rgba(201, 164, 93, 0.72);
        color: var(--brass);
        outline: none;
        transform: translateY(-1px);
      }

      .icon-button svg {
        width: 19px;
        height: 19px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .icon-button::after {
        content: attr(data-tooltip);
        position: absolute;
        top: calc(100% + 8px);
        right: 0;
        width: max-content;
        max-width: 150px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 4px;
        background: #100b22;
        color: #edf0ec;
        font-size: 11px;
        font-weight: 700;
        opacity: 0;
        pointer-events: none;
        transform: translateY(-3px);
        transition: opacity 120ms ease, transform 120ms ease;
        white-space: nowrap;
      }

      .icon-button:hover::after,
      .icon-button:focus-visible::after {
        opacity: 1;
        transform: translateY(0);
      }

      .game-layout {
        min-height: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 292px;
        grid-template-areas: "stage rail";
      }

      .board-stage {
        position: relative;
        grid-area: stage;
        min-width: 0;
        min-height: 0;
        overflow: hidden;
        background: #1b1438;
      }

      #sceneMount,
      #sceneMount canvas,
      .board-hit-layer {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #sceneMount canvas {
        z-index: 1;
        display: block;
        touch-action: none;
      }

      .board-hit-layer {
        z-index: 2;
        overflow: hidden;
        pointer-events: none;
      }

      .square-hit {
        position: absolute;
        display: block;
        min-width: 1px;
        min-height: 1px;
        padding: 0;
        border: 0;
        background: transparent;
        color: transparent;
        cursor: pointer;
        pointer-events: auto;
      }

      .square-hit:focus-visible {
        outline: 3px solid var(--teal);
        outline-offset: -3px;
      }

      .stage-hud {
        position: absolute;
        z-index: 4;
        top: 18px;
        left: 18px;
        max-width: min(340px, calc(100% - 36px));
        padding: 10px 13px 11px;
        border-left: 3px solid var(--brass);
        background: rgba(20, 14, 40, 0.76);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.22);
        backdrop-filter: blur(10px);
        pointer-events: none;
      }

      .stage-hud strong {
        display: block;
        color: #fffaf0;
        font-size: 14px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .stage-hud span {
        display: block;
        margin-top: 3px;
        color: #c4cbca;
        font-size: 12px;
        font-weight: 650;
        line-height: 1.35;
      }

      .side-marker {
        position: absolute;
        z-index: 4;
        left: 50%;
        padding: 4px 8px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 4px;
        background: rgba(16, 11, 34, 0.62);
        color: rgba(242, 235, 220, 0.7);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0;
        pointer-events: none;
        text-transform: uppercase;
        transform: translateX(-50%);
      }

      .side-marker.black-side {
        top: 16px;
      }

      .side-marker.white-side {
        bottom: 16px;
      }

      .scene-loading,
      .scene-error {
        position: absolute;
        z-index: 7;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: #1b1438;
        color: #f6f1e7;
        text-align: center;
        transition: opacity 240ms ease, visibility 240ms ease;
      }

      .scene-loading.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .game-report {
        position: absolute;
        inset: 0;
        z-index: 9;
        display: grid;
        place-items: center;
        padding: 20px;
        background: rgba(12, 8, 28, 0.72);
        backdrop-filter: blur(4px);
      }
      .game-report[hidden] { display: none; }
      .report-card {
        width: min(360px, 100%);
        max-height: 100%;
        overflow: auto;
        padding: 22px 22px 20px;
        border-radius: 16px;
        border: 1px solid rgba(201, 164, 93, 0.5);
        background: linear-gradient(165deg, #241a48, #150f30);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
        color: #f6f1e7;
        text-align: center;
        animation: reportIn 320ms ease;
      }
      @keyframes reportIn { from { opacity: 0; transform: translateY(14px) scale(0.97); } to { opacity: 1; transform: none; } }
      .report-result { margin: 0 0 4px; font-size: 1.35rem; font-weight: 800; letter-spacing: 0.01em; }
      .report-result.win { color: #7ee0a6; }
      .report-result.loss { color: #f0897f; }
      .report-result.draw { color: #e6c66d; }
      .report-eyebrow { margin: 6px 0 2px; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.16em; color: #b9a9d9; }
      .report-rating { display: grid; gap: 2px; margin-bottom: 6px; }
      .report-rating-num { font-size: 3rem; font-weight: 900; line-height: 1; color: #f0d493; }
      .report-title { font-size: 0.98rem; font-weight: 700; color: #e9dfc6; }
      .report-note { margin: 10px 2px 14px; font-size: 0.82rem; line-height: 1.4; color: #cfc6e6; }
      .report-stats { display: grid; gap: 5px; margin-bottom: 18px; text-align: left; }
      .report-stats .stat-row {
        display: flex; justify-content: space-between; padding: 6px 12px;
        border-radius: 8px; background: rgba(255, 255, 255, 0.05); font-size: 0.85rem;
      }
      .report-stats .stat-row span:last-child { font-weight: 700; color: #f0d493; }
      .report-newgame { width: 100%; }

      .loading-copy {
        display: grid;
        justify-items: center;
        gap: 12px;
      }

      .loading-piece {
        color: var(--brass);
        font-family: Georgia, "Times New Roman", serif;
        font-size: 48px;
        animation: settle 1.2s ease-in-out infinite;
      }

      .loading-copy strong,
      .scene-error strong {
        font-size: 14px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .scene-error[hidden] {
        display: none;
      }

      @keyframes settle {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }

      .control-rail {
        grid-area: rail;
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto auto minmax(150px, 1fr);
        overflow: hidden;
        border-left: 1px solid var(--line);
        background: var(--panel);
      }

      .rail-section {
        padding: 17px 18px;
        border-bottom: 1px solid var(--line);
      }

      .rail-section:last-child {
        border-bottom: 0;
      }

      .eyebrow {
        margin: 0 0 7px;
        color: var(--brass);
        font-size: 9px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .match-title {
        margin: 0;
        color: #f4f0e7;
        font-size: 18px;
        font-weight: 850;
        letter-spacing: 0;
      }

      .match-subtitle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        line-height: 1.4;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 4px;
        padding: 4px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #150f2e;
      }

      .level-button {
        min-height: 36px;
        padding: 0 10px;
        border: 0;
        border-radius: 4px;
        background: transparent;
        color: #929a9b;
        cursor: pointer;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      .level-button:hover,
      .level-button:focus-visible {
        color: #f4f0e7;
        outline: none;
      }

      .level-button.active {
        background: #33285a;
        color: #ffffff;
        box-shadow: inset 0 0 0 1px rgba(201, 164, 93, 0.28);
      }

      .command-row {
        display: grid;
        grid-template-columns: 1fr 44px;
        gap: 8px;
        margin-top: 10px;
      }

      .new-game-button,
      .view-button {
        min-height: 42px;
        border: 1px solid rgba(201, 164, 93, 0.46);
        border-radius: 6px;
        background: var(--brass);
        color: #14120d;
        cursor: pointer;
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0;
        text-transform: uppercase;
        transition: filter 140ms ease, transform 140ms ease;
      }

      .new-game-button:hover,
      .new-game-button:focus-visible,
      .view-button:hover,
      .view-button:focus-visible {
        filter: brightness(1.08);
        outline: none;
        transform: translateY(-1px);
      }

      .view-button {
        display: grid;
        place-items: center;
        padding: 0;
        border-color: var(--line);
        background: #352b5e;
        color: #e5e8e5;
      }

      .view-button svg {
        width: 18px;
        height: 18px;
        fill: none;
        stroke: currentColor;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-width: 2;
      }

      .captures {
        display: grid;
        gap: 10px;
      }

      .capture-row {
        display: grid;
        grid-template-columns: 68px minmax(0, 1fr);
        align-items: center;
        gap: 8px;
      }

      .capture-row > span {
        color: #8f9899;
        font-size: 10px;
        font-weight: 850;
        text-transform: uppercase;
      }

      .capture-pieces {
        min-height: 24px;
        color: #f1eadc;
        font-family: Georgia, "Times New Roman", serif;
        font-size: 22px;
        line-height: 1;
        overflow-wrap: anywhere;
      }

      .capture-pieces.cpu {
        color: #747b7d;
        text-shadow: 0 1px 0 #000000;
      }

      .moves-section {
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 9px;
        overflow: hidden;
      }

      .move-list {
        min-height: 0;
        overflow: auto;
        scrollbar-color: #42494b #151819;
        scrollbar-width: thin;
      }

      .move-empty {
        color: #6f7779;
        font-size: 12px;
        font-weight: 650;
      }

      .move-line {
        display: grid;
        grid-template-columns: 30px 1fr 1fr;
        gap: 7px;
        min-height: 30px;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
        color: #c8cecc;
        font-size: 11px;
        font-variant-numeric: tabular-nums;
        font-weight: 720;
      }

      .move-line .number {
        color: #697174;
      }

      .thinking .stage-hud {
        border-left-color: var(--teal);
      }

      .thinking .square-hit {
        cursor: wait;
      }

      @media (max-width: 820px) {
        body {
          overflow: auto;
        }

        .app-shell {
          height: auto;
          min-height: 100dvh;
          overflow: visible;
        }

        .game-layout {
          grid-template-columns: 1fr;
          grid-template-rows: min(72dvh, 700px) auto;
          grid-template-areas:
            "stage"
            "rail";
        }

        .control-rail {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: auto auto;
          border-top: 1px solid var(--line);
          border-left: 0;
        }

        .rail-section {
          border-right: 1px solid var(--line);
        }

        .moves-section {
          min-height: 190px;
        }
      }

      @media (max-width: 560px) {
        .app-shell {
          grid-template-rows: 60px auto;
        }

        .topbar {
          padding: 0 10px 0 12px;
        }

        .brand {
          gap: 8px;
        }

        .brand-mark {
          width: 34px;
          height: 34px;
          font-size: 24px;
        }

        .brand-copy h1 {
          font-size: 18px;
        }

        .brand-copy span {
          display: none;
        }

        .game-layout {
          grid-template-rows: min(67dvh, 560px) auto;
        }

        .control-rail {
          grid-template-columns: 1fr;
          grid-template-rows: auto;
        }

        .rail-section {
          border-right: 0;
        }

        .stage-hud {
          top: 10px;
          left: 10px;
          max-width: calc(100% - 20px);
        }

        .side-marker {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell" id="gameShell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">&#9816;</div>
          <div class="brand-copy">
            <h1>Knightfall Chess</h1>
            <span>Playable 3D edition</span>
          </div>
        </div>

        <div class="top-actions">
          <a class="icon-button" href="./new-arrivals.html" aria-label="Back to Whats New" data-tooltip="Back to site" style="text-decoration: none;">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 12H5"></path>
              <path d="m12 19-7-7 7-7"></path>
            </svg>
          </a>
          <button class="icon-button" type="button" id="flipViewTop" aria-label="Flip board view" data-tooltip="Flip board">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 7h-9"></path>
              <path d="m16 3 4 4-4 4"></path>
              <path d="M4 17h9"></path>
              <path d="m8 21-4-4 4-4"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" id="saveGameTop" aria-label="Save game" data-tooltip="Save game">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
              <path d="M17 21v-8H7v8"></path>
              <path d="M7 3v5h8"></path>
            </svg>
          </button>
          <button class="icon-button" type="button" id="newGameTop" aria-label="Start a new game" data-tooltip="New game">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M3 12a9 9 0 1 0 3-6.7"></path>
              <path d="M3 4v6h6"></path>
            </svg>
          </button>
        </div>
      </header>

      <section class="game-layout">
        <section class="board-stage" id="boardStage" aria-label="3D chess board">
          <div id="sceneMount" data-testid="chess-scene"></div>

          <div class="stage-hud" aria-live="polite">
            <strong id="turnLabel">White to move</strong>
            <span id="status">Select a white piece.</span>
          </div>

          <span class="side-marker black-side" id="farSideLabel">Bekah</span>
          <span class="side-marker white-side" id="nearSideLabel">You</span>

          <div class="scene-loading" id="loadingOverlay">
            <div class="loading-copy">
              <span class="loading-piece" aria-hidden="true">&#9812;</span>
              <strong>Setting the board</strong>
            </div>
          </div>

          <div class="scene-error" id="sceneError" hidden>
            <strong>3D graphics could not start in this browser.</strong>
          </div>

          <div class="game-report" id="gameReport" hidden>
            <div class="report-card">
              <p class="report-result" id="reportResult">Result</p>
              <p class="report-eyebrow">Your performance rating</p>
              <div class="report-rating">
                <span class="report-rating-num" id="reportRating">0</span>
                <span class="report-title" id="reportTitle">—</span>
              </div>
              <p class="report-note" id="reportNote"></p>
              <div class="report-stats" id="reportStats"></div>
              <button class="new-game-button report-newgame" type="button" id="reportNewGame">Play Again</button>
            </div>
          </div>
        </section>

        <aside class="control-rail" aria-label="Game controls and match details">
          <section class="rail-section">
            <p class="eyebrow">Match</p>
            <h2 class="match-title">You vs Bekah</h2>
            <p class="match-subtitle" id="matchSubtitle">Easy level</p>
          </section>

          <section class="rail-section">
            <p class="eyebrow">Difficulty</p>
            <div class="segmented" role="group" aria-label="Choose difficulty">
              <button class="level-button active" type="button" data-level="easy" aria-pressed="true">Easy</button>
              <button class="level-button" type="button" data-level="mid" aria-pressed="false">Mid</button>
              <button class="level-button" type="button" data-level="pro" aria-pressed="false">Pro</button>
            </div>
            <div class="command-row">
              <button class="new-game-button" type="button" id="newGameButton">New Game</button>
              <button class="view-button" type="button" id="flipViewButton" aria-label="Flip board view" title="Flip board">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M20 7h-9"></path>
                  <path d="m16 3 4 4-4 4"></path>
                  <path d="M4 17h9"></path>
                  <path d="m8 21-4-4 4-4"></path>
                </svg>
              </button>
            </div>
          </section>

          <section class="rail-section captures" aria-label="Captured pieces">
            <p class="eyebrow">Captured</p>
            <div class="capture-row">
              <span>You took</span>
              <div class="capture-pieces" id="whiteCaptures"></div>
            </div>
            <div class="capture-row">
              <span>CPU took</span>
              <div class="capture-pieces cpu" id="blackCaptures"></div>
            </div>
          </section>

          <section class="rail-section moves-section" aria-label="Move history">
            <p class="eyebrow">Moves</p>
            <div class="move-list" id="moveList">
              <span class="move-empty">No moves yet.</span>
            </div>
          </section>
        </aside>
      </section>
    </main>

    <script id="threeCoreSource" type="text/plain">/**

    <script type="module">
      (async function () {
        var loadingOverlay = document.getElementById("loadingOverlay");
        var sceneError = document.getElementById("sceneError");

        var THREE;
        try {
          var coreSource = document.getElementById("threeCoreSource").textContent;
          var moduleSource = document.getElementById("threeModuleSource").textContent;
          var coreUrl = URL.createObjectURL(new Blob([coreSource], { type: "text/javascript" }));
          var patchedModule = moduleSource.split('from"./three.core.min.js"').join('from"' + coreUrl + '"');
          var moduleUrl = URL.createObjectURL(new Blob([patchedModule], { type: "text/javascript" }));
          THREE = await import(moduleUrl);
          URL.revokeObjectURL(moduleUrl);
          URL.revokeObjectURL(coreUrl);
        } catch (error) {
          loadingOverlay.classList.add("hidden");
          sceneError.hidden = false;
          console.error("Knightfall Chess could not load its 3D renderer.", error);
          return;
        }

        var sceneMount = document.getElementById("sceneMount");
        var boardStage = document.getElementById("boardStage");
        var shellEl = document.getElementById("gameShell");
        var statusEl = document.getElementById("status");
        var turnLabelEl = document.getElementById("turnLabel");
        var matchSubtitleEl = document.getElementById("matchSubtitle");
        var moveListEl = document.getElementById("moveList");
        var whiteCapturesEl = document.getElementById("whiteCaptures");
        var blackCapturesEl = document.getElementById("blackCaptures");
        var nearSideLabel = document.getElementById("nearSideLabel");
        var farSideLabel = document.getElementById("farSideLabel");
        var newGameButton = document.getElementById("newGameButton");
        var newGameTop = document.getElementById("newGameTop");
        var flipViewButton = document.getElementById("flipViewButton");
        var flipViewTop = document.getElementById("flipViewTop");
        var saveGameTop = document.getElementById("saveGameTop");
        var levelButtons = Array.prototype.slice.call(document.querySelectorAll(".level-button"));
        var gameReportEl = document.getElementById("gameReport");
        var reportResultEl = document.getElementById("reportResult");
        var reportRatingEl = document.getElementById("reportRating");
        var reportTitleEl = document.getElementById("reportTitle");
        var reportNoteEl = document.getElementById("reportNote");
        var reportStatsEl = document.getElementById("reportStats");
        var reportNewGameBtn = document.getElementById("reportNewGame");

        var PIECE_LABELS = { p: "Pawn", n: "Knight", b: "Bishop", r: "Rook", q: "Queen", k: "King" };
        var PIECE_LETTERS = { K: "K", Q: "Q", R: "R", B: "B", N: "N", P: "P", k: "K", q: "Q", r: "R", b: "B", n: "N", p: "P" };
        var CAPTURE_ENTITIES = {
          K: "&#9812;", Q: "&#9813;", R: "&#9814;", B: "&#9815;", N: "&#9816;", P: "&#9817;",
          k: "&#9818;", q: "&#9819;", r: "&#9820;", b: "&#9821;", n: "&#9822;", p: "&#9823;"
        };
        var VALUES = { p: 100, n: 320, b: 330, r: 500, q: 900, k: 20000 };
        var START = "rnbqkbnrpppppppp................................PPPPPPPPRNBQKBNR";

        var board = [];
        var selected = null;
        var legalTargets = [];
        var turn = "w";
        var gameOver = false;
        var level = "easy";
        var lastMove = null;
        var whiteCaptures = [];
        var blackCaptures = [];
        var history = [];
        var pendingAnimation = null;
        // Post-game rating: track how close each of the player's moves was to the
        // engine's best (average centipawn loss -> an approximate strength rating).
        var playerStats = { moves: 0, totalLoss: 0, best: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0 };
        var pendingPlayerAnalysis = null;

        var renderer;
        var scene;
        var camera;
        var cameraGoal;
        var boardGroup;
        var squareMeshes = [];
        var pieceGroup;
        var graveGroup;
        var markerGroup;
        var hoverMarker;
        var moveAnimation = null;
        var captureAnimation = null;
        var sceneReady = false;
        var viewSide = "white";
        var hitButtons = [];
        var lastHitPos = null;
        var lastFrameTime = 0;
        var reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        var pieceMaterials = {
          white: new THREE.MeshStandardMaterial({
            color: 0xf6efe0,
            roughness: 0.52,
            metalness: 0.0,
            emissive: 0x2b2418,
            emissiveIntensity: 0.32,
            // Draw both faces so thin details (the knight's mane) and any open
            // surfaces never read as see-through slits.
            side: THREE.DoubleSide
          }),
          black: new THREE.MeshStandardMaterial({
            color: 0x3a4551,
            roughness: 0.46,
            metalness: 0.16,
            emissive: 0x0d141c,
            emissiveIntensity: 0.55,
            side: THREE.DoubleSide
          })
        };
        var piecePrototypeCache = {};

        function colorOf(piece) {
          if (!piece) return null;
          return piece === piece.toUpperCase() ? "w" : "b";
        }

        function enemy(color) {
          return color === "w" ? "b" : "w";
        }

        function inBounds(row, col) {
          return row >= 0 && row < 8 && col >= 0 && col < 8;
        }

        function indexOf(row, col) {
          return row * 8 + col;
        }

        function rowOf(index) {
          return Math.floor(index / 8);
        }

        function colOf(index) {
          return index % 8;
        }

        function squareName(index) {
          return "abcdefgh"[colOf(index)] + (8 - rowOf(index));
        }

        function pieceName(piece) {
          return PIECE_LABELS[piece.toLowerCase()];
        }

        function squarePosition(index) {
          return new THREE.Vector3(colOf(index) - 3.5, 0.19, rowOf(index) - 3.5);
        }

        function finishMesh(mesh) {
          mesh.castShadow = true;
          mesh.receiveShadow = true;
          return mesh;
        }

        // Catmull-Rom through the control points so a lathe's vertical silhouette
        // reads as a turned curve instead of a chain of straight facets.
        function smoothProfile(controlPoints, subdivisions) {
          var pts = controlPoints.map(function (point) {
            return new THREE.Vector2(point[0], point[1]);
          });
          if (pts.length < 3) return pts;
          var sub = subdivisions || 8;
          var result = [];
          for (var i = 0; i < pts.length - 1; i++) {
            var p0 = pts[i === 0 ? 0 : i - 1];
            var p1 = pts[i];
            var p2 = pts[i + 1];
            var p3 = pts[i + 2 >= pts.length ? pts.length - 1 : i + 2];
            for (var s = 0; s < sub; s++) {
              var t = s / sub;
              var t2 = t * t;
              var t3 = t2 * t;
              var x = 0.5 * (2 * p1.x + (-p0.x + p2.x) * t + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
              var y = 0.5 * (2 * p1.y + (-p0.y + p2.y) * t + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
              result.push(new THREE.Vector2(Math.max(0, x), y));
            }
          }
          result.push(pts[pts.length - 1]);
          return result;
        }

        function addLathe(group, material, profile, segments, capTop) {
          var points = smoothProfile(profile, 4);
          var seg = 44;
          var mesh = finishMesh(new THREE.Mesh(new THREE.LatheGeometry(points, seg), material));
          group.add(mesh);
          // A lathe is an open surface of revolution, so its top is a bare ring —
          // seen from above it reads as a hole. Cap it with a disc under the head.
          if (capTop) {
            var top = points[points.length - 1];
            if (top.x > 0.001) {
              var cap = finishMesh(new THREE.Mesh(new THREE.CircleGeometry(top.x, seg), material));
              cap.rotation.x = -Math.PI / 2;
              cap.position.y = top.y;
              group.add(cap);
            }
          }
          return mesh;
        }

        function addBase(group, material) {
          addLathe(group, material, [
            [0.30, 0], [0.40, 0.02], [0.44, 0.08], [0.435, 0.14], [0.40, 0.20], [0.355, 0.26], [0.325, 0.32], [0.31, 0.38]
          ], 30);
        }

        function buildPiecePrototype(type, color) {
          var group = new THREE.Group();
          var material = color === "w" ? pieceMaterials.white : pieceMaterials.black;
          var darkDetail = color === "w" ? 0x8a7658 : 0x1c242e;
          var detailMaterial = new THREE.MeshStandardMaterial({ color: darkDetail, roughness: 0.5, metalness: 0.1 });
          addBase(group, material);

          if (type === "p") {
            addLathe(group, material, [
              [0.31, 0.35], [0.27, 0.48], [0.21, 0.6], [0.175, 0.72], [0.17, 0.8], [0.2, 0.87], [0.24, 0.92], [0.25, 0.95]
            ], 48, true);
            var pawnCollar = finishMesh(new THREE.Mesh(new THREE.TorusGeometry(0.2, 0.045, 14, 40), material));
            pawnCollar.rotation.x = Math.PI / 2;
            pawnCollar.position.y = 0.97;
            group.add(pawnCollar);
            var pawnHead = finishMesh(new THREE.Mesh(new THREE.SphereGeometry(0.245, 40, 28), material));
            pawnHead.position.y = 1.16;
            group.add(pawnHead);
          }

          if (type === "r") {
            addLathe(group, material, [
              [0.31, 0.35], [0.28, 0.46], [0.24, 0.56], [0.23, 0.9], [0.235, 1.08], [0.27, 1.16], [0.34, 1.22], [0.36, 1.34]
            ], 48, true);
            var rookCrown = finishMesh(new THREE.Mesh(new THREE.CylinderGeometry(0.36, 0.33, 0.2, 44), material));
            rookCrown.position.y = 1.37;
            group.add(rookCrown);
            for (var rookStep = 0; rookStep < 5; rookStep++) {
              var battlement = finishMesh(new THREE.Mesh(new THREE.CylinderGeometry(0.085, 0.095, 0.2, 24), material));
              var rookAngle = rookStep * Math.PI * 2 / 5;
              battlement.position.set(Math.sin(rookAngle) * 0.25, 1.54, Math.cos(rookAngle) * 0.25);
              group.add(battlement);
            }
          }

          if (type === "b") {
            addLathe(group, material, [
              [0.31, 0.35], [0.27, 0.5], [0.21, 0.66], [0.17, 0.84], [0.16, 1.02], [0.2, 1.14], [0.25, 1.2], [0.28, 1.28]
            ], 48, true);
            var bishopHead = finishMesh(new THREE.Mesh(new THREE.SphereGeometry(0.25, 40, 30), material));
            bishopHead.scale.set(0.84, 1.28, 0.84);

            ], 48, true);

          if (type === "n") {

            var muzzle = finishMesh(new THREE.Mesh(new THREE.SphereGeometry(0.17, 40, 28), material));
            muzzle.scale.set(0.95, 0.78, 1.65);

            [-0.12, 0.12].forEach(function (x) {
              var ear = finishMesh(new THREE.Mesh(new THREE.ConeGeometry(0.07, 0.28, 28), material));
              ear.position.set(x, 1.68, -0.22);

              group.add(ear);
            });

            var mane = finishMesh(new THREE.Mesh(new THREE.SphereGeometry(0.3, 32, 22), material));
            mane.scale.set(0.34, 1.05, 0.52);
            mane.position.set(0, 1.18, 0.05);

          group.scale.setScalar(0.79);

        function pieceObject(piece) {
          var key = piece;
          if (!piecePrototypeCache[key]) {
            piecePrototypeCache[key] = buildPiecePrototype(piece.toLowerCase(), colorOf(piece));
          }
          return piecePrototypeCache[key].clone(true);
        }

        // Where a captured piece stands once it is off the board. Black pieces
        // (the ones you take) line up along the right edge of the table; white
        // pieces (the ones Bekah takes) line up along the left — opposing sides.
        // Two columns per side, filling front to back.
        var GRAVE_Y = -0.5;
        function graveSlot(pieceColor, index) {
          var side = pieceColor === "b" ? 1 : -1;
          var col = index % 2;
          var rowN = Math.floor(index / 2);
          var x = side * (5.5 + col * 0.95);
          var z = -3.15 + rowN * 0.82;
          return new THREE.Vector3(x, GRAVE_Y, z);
        }

        // Stand a captured piece on the table at its graveyard slot.
        function addGravePiece(piece, pieceColor, index) {
          var object = pieceObject(piece);
          object.position.copy(graveSlot(pieceColor, index));
          graveGroup.add(object);
          return object;
        }

        // Rebuild both graveyards from the capture lists. When a capture is
        // animating in, skip that side's newest piece — the toss animation is
        // flying it into place.
        function renderGraveyard(animatingColor) {
          if (!graveGroup) return;
          clearGroup(graveGroup);
          var blackTaken = whiteCaptures.length - (animatingColor === "b" ? 1 : 0);
          for (var i = 0; i < blackTaken; i++) addGravePiece(whiteCaptures[i], "b", i);
          var whiteTaken = blackCaptures.length - (animatingColor === "w" ? 1 : 0);
          for (var j = 0; j < whiteTaken; j++) addGravePiece(blackCaptures[j], "w", j);
        }

        function addRail(x, z, width, depth, material) {
          var rail = finishMesh(new THREE.Mesh(new THREE.BoxGeometry(width, 0.42, depth), material));
          rail.position.set(x, -0.12, z);
          boardGroup.add(rail);
        }

        // Procedural wood grain painted to a canvas (keeps the file self-contained).
        // Concentric, slightly wavy tree rings plus fine grain and speckle — mapped
        // onto the round tabletop so it reads as a real cut-wood surface.
        function makeWoodTexture() {
          var s = 512;
          var canvas = document.createElement("canvas");
          canvas.width = canvas.height = s;
          var ctx = canvas.getContext("2d");
          var img = ctx.createImageData(s, s);
          var data = img.data;
          var cx = s / 2, cy = s / 2;
          for (var y = 0; y < s; y++) {
            for (var x = 0; x < s; x++) {
              var dx = x - cx, dy = y - cy;
              var r = Math.sqrt(dx * dx + dy * dy);
              var ang = Math.atan2(dy, dx);
              // Wobble the ring radius so rings aren't perfect circles.
              var wob = Math.sin(ang * 5) * 6 + Math.sin(ang * 11 + r * 0.05) * 4;
              var ring = Math.sin((r + wob) * 0.17);
              var streak = Math.sin(ang * 240) * 0.03;          // fine radial grain
              var shade = 0.52 + ring * 0.2 + streak + (Math.random() - 0.5) * 0.05;
              shade = Math.max(0.22, Math.min(1, shade));
              var idx = (y * s + x) * 4;
              data[idx] = Math.round(150 * shade + 46);
              data[idx + 1] = Math.round(98 * shade + 28);
              data[idx + 2] = Math.round(54 * shade + 14);
              data[idx + 3] = 255;
            }
          }
          ctx.putImageData(img, 0, 0);
          var tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          tex.anisotropy = 4;
          return tex;
        }

        function setupScene() {

          var walnut = new THREE.MeshPhysicalMaterial({

            roughness: 0.34,

            clearcoat: 0.42,

          });
          var baseMaterial = new THREE.MeshStandardMaterial({ color: 0x17110e, roughness: 0.55, metalness: 0.05 });
          var brassMaterial = new THREE.MeshStandardMaterial({ color: 0xba9150, roughness: 0.3, metalness: 0.72 });

          var base = finishMesh(new THREE.Mesh(new THREE.BoxGeometry(9.3, 0.32, 9.3), baseMaterial));
          base.position.y = -0.35;
          boardGroup.add(base);
          addRail(0, -4.27, 9.18, 0.64, walnut);
          addRail(0, 4.27, 9.18, 0.64, walnut);
          addRail(-4.27, 0, 0.64, 8.55, walnut);
          addRail(4.27, 0, 0.64, 8.55, walnut);

          var trimPieces = [
            [0, -4.01, 8.1, 0.035], [0, 4.01, 8.1, 0.035],
            [-4.01, 0, 0.035, 8.1], [4.01, 0, 0.035, 8.1]
          ];
          trimPieces.forEach(function (item) {
            var trim = finishMesh(new THREE.Mesh(new THREE.BoxGeometry(item[2], 0.05, item[3]), brassMaterial));
            trim.position.set(item[0], 0.105, item[1]);
            boardGroup.add(trim);
          });

          var squareGeometry = new THREE.BoxGeometry(0.99, 0.18, 0.99);
          squareMeshes = [];
          for (var i = 0; i < 64; i++) {
            var lightSquare = (rowOf(i) + colOf(i)) % 2 === 0;
            var squareColor = lightSquare ? 0xc7b591 : 0x2a2f36;
            var squareMaterial = new THREE.MeshStandardMaterial({
              color: squareColor,
              roughness: lightSquare ? 0.66 : 0.54,
              metalness: 0.02
            });
            var square = new THREE.Mesh(squareGeometry, squareMaterial);
            var squarePoint = squarePosition(i);
            square.position.set(squarePoint.x, 0, squarePoint.z);
            square.userData.index = i;
            square.receiveShadow = true;
            boardGroup.add(square);
            squareMeshes.push(square);
          }

          pieceGroup = new THREE.Group();
          graveGroup = new THREE.Group();
          markerGroup = new THREE.Group();
          boardGroup.add(markerGroup);
          boardGroup.add(graveGroup);
          boardGroup.add(pieceGroup);

          hoverMarker = new THREE.Mesh(
            new THREE.RingGeometry(0.38, 0.46, 40),
            new THREE.MeshBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.28, depthWrite: false })
          );
          hoverMarker.rotation.x = -Math.PI / 2;
          hoverMarker.position.y = 0.13;
          hoverMarker.visible = false;

          setupHitLayer();

        function clearGroup(group) {
          while (group.children.length) group.remove(group.children[group.children.length - 1]);
        }

        function addFlatMarker(index, material, radius, y) {
          var marker = new THREE.Mesh(new THREE.CircleGeometry(radius, 40), material);
          var point = squarePosition(index);
          marker.rotation.x = -Math.PI / 2;
          marker.position.set(point.x, y, point.z);
          markerGroup.add(marker);
          return marker;
        }

        function renderSceneState(animateMove) {
          if (!sceneReady) return;
          clearGroup(pieceGroup);
          clearGroup(markerGroup);
          moveAnimation = null;
          captureAnimation = null;

          // Captured pieces standing on the table. If a capture is animating, its
          // newest piece is held back and tossed into place below.
          var capturingColor = (animateMove && pendingAnimation && pendingAnimation.captured)
            ? colorOf(pendingAnimation.captured) : null;
          renderGraveyard(capturingColor);

          var lastMaterial = new THREE.MeshBasicMaterial({ color: 0xc9a45d, transparent: true, opacity: 0.24, depthWrite: false });
          var moveMaterial = new THREE.MeshStandardMaterial({ color: 0xb48be8, emissive: 0x3a2a5e, roughness: 0.34, metalness: 0.08 });
          var captureMaterial = new THREE.MeshBasicMaterial({ color: 0xd9a0ff, transparent: true, opacity: 0.88, depthWrite: false });
          var selectedMaterial = new THREE.MeshBasicMaterial({ color: 0xe6bd6d, transparent: true, opacity: 0.92, depthWrite: false });
          var checkMaterial = new THREE.MeshBasicMaterial({ color: 0xdf665b, transparent: true, opacity: 0.95, depthWrite: false });

          if (lastMove) {
            addFlatMarker(lastMove.from, lastMaterial, 0.47, 0.105);
            addFlatMarker(lastMove.to, lastMaterial, 0.47, 0.106);
          }

          if (selected !== null) {
            var selectedRing = new THREE.Mesh(new THREE.RingGeometry(0.37, 0.46, 40), selectedMaterial);
            var selectedPoint = squarePosition(selected);
            selectedRing.rotation.x = -Math.PI / 2;
            selectedRing.position.set(selectedPoint.x, 0.135, selectedPoint.z);
            markerGroup.add(selectedRing);
          }

          legalTargets.forEach(function (move) {
            var point = squarePosition(move.to);
            if (board[move.to]) {
              var ring = new THREE.Mesh(new THREE.TorusGeometry(0.38, 0.052, 12, 40), captureMaterial);
              ring.rotation.x = Math.PI / 2;
              ring.position.set(point.x, 0.18, point.z);
              markerGroup.add(ring);
            } else {
              var dot = new THREE.Mesh(new THREE.CylinderGeometry(0.14, 0.14, 0.035, 28), moveMaterial);
              dot.position.set(point.x, 0.155, point.z);
              dot.castShadow = true;
              markerGroup.add(dot);
            }
          });

          var checkedKing = findKing(board, turn);
          if (checkedKing !== -1 && isInCheck(board, turn)) {
            var checkRing = new THREE.Mesh(new THREE.RingGeometry(0.36, 0.47, 40), checkMaterial);
            var checkPoint = squarePosition(checkedKing);
            checkRing.rotation.x = -Math.PI / 2;
            checkRing.position.set(checkPoint.x, 0.14, checkPoint.z);
            markerGroup.add(checkRing);
          }

          for (var i = 0; i < 64; i++) {
            var piece = board[i];
            if (!piece) continue;
            var object = pieceObject(piece);
            var destination = squarePosition(i);
            object.position.set(destination.x, 0.105, destination.z);
            object.userData.square = i;
            pieceGroup.add(object);

            if (animateMove && pendingAnimation && pendingAnimation.to === i) {
              var startPoint = squarePosition(pendingAnimation.from);
              object.position.set(startPoint.x, 0.105, startPoint.z);
              // Always glide the piece to its destination — this is core game
              // feedback, so play it even when the OS prefers reduced motion
              // (just a touch quicker). Longer slides take a little more time.
              var slideDist = Math.hypot(destination.x - startPoint.x, destination.z - startPoint.z);
              var isKnight = (pendingAnimation.mover || "").toLowerCase() === "n";
              // Knights leap over the board; everything else keeps a low, weighty glide.
              var arc = reducedMotion
                ? (isKnight ? 0.34 : 0)
                : (isKnight ? 0.7 : 0.14);
              moveAnimation = {
                object: object,
                from: new THREE.Vector3(startPoint.x, 0.105, startPoint.z),
                to: new THREE.Vector3(destination.x, 0.105, destination.z),
                started: nowMs(),
                arc: arc,
                duration: reducedMotion
                  ? Math.max(220, Math.min(340, Math.round(190 + slideDist * 26)))
                  : Math.max(340, Math.min(640, Math.round(330 + slideDist * 40)))
              };
              // The captured piece is lifted off its square and set down on the
              // table beside the board, where it stays for the rest of the game.
              if (pendingAnimation.captured) {
                var capColor = colorOf(pendingAnimation.captured);
                var capArr = capColor === "b" ? whiteCaptures : blackCaptures;
                var capObject = pieceObject(pendingAnimation.captured);
                capObject.position.set(destination.x, 0.105, destination.z);
                graveGroup.add(capObject);
                captureAnimation = {
                  object: capObject,
                  from: new THREE.Vector3(destination.x, 0.105, destination.z),
                  to: graveSlot(capColor, capArr.length - 1),
                  started: nowMs(),
                  duration: reducedMotion ? 360 : 660
                };
              }
            }
          }

          pendingAnimation = null;
          updateHitButtons();
        }

        function setupHitLayer() {
          var layer = document.createElement("div");
          layer.className = "board-hit-layer";
          layer.setAttribute("aria-label", "Chess board squares");
          sceneMount.appendChild(layer);

          for (var i = 0; i < 64; i++) {
            var button = document.createElement("button");
            button.type = "button";
            button.className = "square-hit";
            button.dataset.index = i;
            button.dataset.square = squareName(i);
            button.addEventListener("click", onSquareButtonClick);
            button.addEventListener("pointerenter", onSquareHover);
            button.addEventListener("pointerleave", clearHover);
            layer.appendChild(button);
            hitButtons.push(button);
          }
        }

        function projectPoint(vector, width, height) {
          var projected = vector.clone().project(camera);
          return {
            x: (projected.x * 0.5 + 0.5) * width,
            y: (-projected.y * 0.5 + 0.5) * height
          };
        }

        function updateHitGeometry() {
          if (!camera || !hitButtons.length) return;
          var width = sceneMount.clientWidth;
          var height = sceneMount.clientHeight;
          if (!width || !height) return;

          for (var i = 0; i < 64; i++) {
            var center = squarePosition(i);
            var corners = [
              new THREE.Vector3(center.x - 0.49, 0.11, center.z - 0.49),
              new THREE.Vector3(center.x + 0.49, 0.11, center.z - 0.49),
              new THREE.Vector3(center.x + 0.49, 0.11, center.z + 0.49),
              new THREE.Vector3(center.x - 0.49, 0.11, center.z + 0.49)
            ].map(function (point) {
              return projectPoint(point, width, height);
            });
            var xs = corners.map(function (point) { return point.x; });
            var ys = corners.map(function (point) { return point.y; });
            var minX = Math.min.apply(null, xs);
            var maxX = Math.max.apply(null, xs);
            var minY = Math.min.apply(null, ys);
            var maxY = Math.max.apply(null, ys);
            var boxWidth = Math.max(1, maxX - minX);
            var boxHeight = Math.max(1, maxY - minY);
            var polygon = corners.map(function (point) {
              return ((point.x - minX) / boxWidth * 100).toFixed(2) + "% " + ((point.y - minY) / boxHeight * 100).toFixed(2) + "%";
            }).join(",");
            var button = hitButtons[i];
            button.style.left = minX.toFixed(1) + "px";
            button.style.top = minY.toFixed(1) + "px";
            button.style.width = boxWidth.toFixed(1) + "px";
            button.style.height = boxHeight.toFixed(1) + "px";
            button.style.clipPath = "polygon(" + polygon + ")";
          }
        }

        function updateHitButtons() {
          hitButtons.forEach(function (button, index) {
            var piece = board[index];
            var move = legalTargets.find(function (candidate) { return candidate.to === index; });
            button.setAttribute("aria-label", squareName(index) + (piece ? " " + (colorOf(piece) === "w" ? "white " : "black ") + pieceName(piece) : " empty"));
            button.dataset.legal = move ? "true" : "false";
            button.dataset.capture = move && board[index] ? "true" : "false";
            button.dataset.selected = selected === index ? "true" : "false";
            button.setAttribute("aria-disabled", gameOver || turn !== "w" ? "true" : "false");
          });
        }

        function onSquareButtonClick(event) {
          chooseSquare(Number(event.currentTarget.dataset.index));
        }

        function onSquareHover(event) {
          if (!sceneReady) return;
          var index = Number(event.currentTarget.dataset.index);

          lastMove = null;

          blackCaptures = [];

        // Positive score favors Black (the computer); negative favors White (the player).

            var w = Math.exp((pool[j].score - bestScore) / temp);
            weights.push(w); total += w;
          }
          var r = Math.random() * total;
          for (var k = 0; k < pool.length; k++) { r -= weights[k]; if (r <= 0) return pool[k].move; }
          return pool[pool.length - 1].move;
        }

        // Human-like clock: ponder longer in rich or sharp positions, move
        // quickly when there is little to weigh.
        function thinkTimeMs(moves) {
          var captures = 0;
          for (var i = 0; i < moves.length; i++) if (board[moves[i].to]) captures++;
          var t = 1300 + Math.min(moves.length, 34) * 24 + captures * 34;
          if (isInCheck(board, "b")) t += 500;
          t += Math.random() * 520 - 160;
          return Math.max(750, Math.min(2600, t));
        }

        // Iterative-deepening search shared by Mid and Pro. `cfg` sets how deep it
        // looks, how long it may think, and how tightly it hews to the best move.
        function chooseSearchMove(moves, cfg) {
          aiDeadline = nowMs() + Math.min(cfg.timeCap, thinkTimeMs(moves) * cfg.timeMul);
          aiAbort = false;
          aiNodeCount = 0;
          aiNodeCap = cfg.nodeCap;
          killers = [];
          orderMovesInPlace(board, moves, 0, 0);
          var bestMove = moves[0];
          var bestScore = 0;
          var completed = null;
          for (var depth = 2; depth <= cfg.maxDepth; depth++) {
            if (bestMove) {
              var bi = moves.indexOf(bestMove);
              if (bi > 0) { moves.splice(bi, 1); moves.unshift(bestMove); }
            }
            var alpha = -Infinity;
            var iterBest = null, iterScore = -Infinity, scored = [];
            for (var i = 0; i < moves.length; i++) {
              var clone = board.slice();
              applyMove(clone, moves[i]);
              // Alpha-beta at the root for depth/strength. The best move gets an
              // exact score; weaker moves fail low and are conservatively
              // under-weighted in the human selection below — which is fine.
              var score = searchBest(clone, depth - 1, alpha, Infinity, "w", 1);
              if (aiAbort) break;
              scored.push({ move: moves[i], score: score });
              if (score > iterScore) { iterScore = score; iterBest = moves[i]; }
              if (iterScore > alpha) alpha = iterScore;
            }
            // Keep a completed shallower result rather than a half-finished deep one.
            if (aiAbort) break;
            bestMove = iterBest;
            bestScore = iterScore;
            completed = scored;
            if (bestScore >= AI_MATE - 100) break;
          }
          var picked = pickHumanMove(completed, bestMove, bestScore, cfg.gap, cfg.temp);
          return picked || bestMove || moves[Math.floor(Math.random() * moves.length)];
        }

        function commitMove(move) {
          var piece = board[move.from];
          var captured = board[move.to];
          if (captured) {
            if (turn === "w") whiteCaptures.push(captured);
            else blackCaptures.push(captured);
          }
          applyMove(board, move);
          lastMove = { from: move.from, to: move.to };
          pendingAnimation = { from: move.from, to: move.to, captured: captured || null, mover: piece };
          history.push(PIECE_LETTERS[piece] + " " + squareName(move.from) + "-" + squareName(move.to) + (captured ? " x" + PIECE_LETTERS[captured] : ""));
          moveLog.push(squareName(move.from) + squareName(move.to));
          turn = enemy(turn);
          saveGame();
        }

        function applyMove(position, move) {
          var piece = position[move.from];
          position[move.to] = move.promotion || piece;
          position[move.from] = "";
        }

        function checkGameEnd() {
          var moves = allLegalMoves(board, turn);
          if (moves.length) {
            if (isInCheck(board, turn)) updateStatus(turn === "w" ? "You are in check." : "Bekah is in check.");
            return false;
          }
          gameOver = true;
          selected = null;
          legalTargets = [];
          if (isInCheck(board, turn)) {
            updateStatus(turn === "w" ? "Checkmate. Bekah wins." : "Checkmate. You beat Bekah!");
          } else {
            updateStatus("Stalemate.");
          }
          renderGame(false);
          return true;
        }

        function updateStatus(message) {
          statusEl.textContent = message;
        }

        function levelLabel() {
          return level === "easy" ? "Easy" : level === "mid" ? "Mid" : "Pro";
        }

        // ---- Save / resume -------------------------------------------------
        // The whole game state is stored locally, so the player can close the
        // window mid-game and pick up exactly where they left off.
        var SAVE_KEY = "knightsfall-chess-save-v1";

        function saveGame() {
          try {
            window.localStorage.setItem(SAVE_KEY, JSON.stringify({
              board: board, turn: turn, gameOver: gameOver, level: level,
              lastMove: lastMove, whiteCaptures: whiteCaptures, blackCaptures: blackCaptures,
              history: history, moveLog: moveLog, playerStats: playerStats, viewSide: viewSide
            }));
            return true;
          } catch (e) { return false; }
        }

        function clearSave() {
          try { window.localStorage.removeItem(SAVE_KEY); } catch (e) {}
        }

        function loadGame() {
          var raw;
          try { raw = window.localStorage.getItem(SAVE_KEY); } catch (e) { return false; }
          if (!raw) return false;
          var data;
          try { data = JSON.parse(raw); } catch (e) { return false; }
          if (!data || !Array.isArray(data.board) || data.board.length !== 64) return false;

          board = data.board;
          turn = data.turn === "b" ? "b" : "w";
          gameOver = !!data.gameOver;
          level = (data.level === "mid" || data.level === "pro") ? data.level : "easy";
          lastMove = data.lastMove || null;
          whiteCaptures = data.whiteCaptures || [];
          blackCaptures = data.blackCaptures || [];
          history = data.history || [];
          moveLog = data.moveLog || [];
          playerStats = data.playerStats || { moves: 0, totalLoss: 0, best: 0, good: 0, inaccuracy: 0, mistake: 0, blunder: 0 };
          viewSide = data.viewSide === "black" ? "black" : "white";
          selected = null;
          legalTargets = [];
          pendingAnimation = null;
          pendingPlayerAnalysis = null;

          levelButtons.forEach(function (b) {
            var active = b.dataset.level === level;
            b.classList.toggle("active", active);
            b.setAttribute("aria-pressed", active ? "true" : "false");
          });
          nearSideLabel.textContent = viewSide === "white" ? "You" : "Bekah";
          farSideLabel.textContent = viewSide === "white" ? "Bekah" : "You";
          hideGameReport();
          shellEl.classList.remove("thinking");
          resizeScene(false);
          updateStatus(gameOver ? "Restored finished game." : "Game resumed. Your move.");
          renderGame(false);

          // If Bekah was on the clock when the game was saved, let her continue.
          if (!gameOver && turn === "b") {
            updateStatus("Bekah is thinking.");
            shellEl.classList.add("thinking");
            window.setTimeout(function () {
              computerMove();
              shellEl.classList.remove("thinking");
            }, 500);
          }
          return true;
        }

        // ---- Post-game performance rating ----------------------------------

        // Grade one of the player's moves: how far it fell short of the best move
        // available, in centipawns (0 = found the engine's top choice).
        function analyzePlayerMove(preBoard, playedMove) {
          var moves = allLegalMoves(preBoard, "w");
          if (moves.length <= 1) return; // forced move — nothing to grade
          // Score the played move first so we always capture it, even if the
          // shallow analysis runs out of time.
          var pi = -1;
          for (var qi = 0; qi < moves.length; qi++) {
            if (moves[qi].from === playedMove.from && moves[qi].to === playedMove.to) { pi = qi; break; }
          }
          if (pi > 0) { moves.unshift(moves.splice(pi, 1)[0]); }
          aiDeadline = nowMs() + 500;
          aiAbort = false; aiNodeCount = 0; killers = [];
          var bestScore = Infinity, playedScore = null;
          for (var i = 0; i < moves.length; i++) {
            var clone = preBoard.slice();
            applyMove(clone, moves[i]);
            var sc = searchBest(clone, 2, -Infinity, Infinity, "b", 1); // ~3-ply look
            if (moves[i].from === playedMove.from && moves[i].to === playedMove.to) playedScore = sc;
            if (sc < bestScore) bestScore = sc;   // White (the player) wants the lowest score
            if (aiAbort) break;
          }
          if (playedScore === null) return;
          var loss = Math.max(0, Math.min(1000, playedScore - bestScore)); // clamp wild mate swings
          playerStats.moves++;
          playerStats.totalLoss += loss;
          if (loss < 20) playerStats.best++;
          else if (loss < 60) playerStats.good++;
          else if (loss < 130) playerStats.inaccuracy++;
          else if (loss < 300) playerStats.mistake++;
          else playerStats.blunder++;
        }

        function ratingTitle(rating) {
          if (rating >= 2700) return "Super Grandmaster";
          if (rating >= 2500) return "Grandmaster (GM)";
          if (rating >= 2400) return "International Master (IM)";
          if (rating >= 2300) return "FIDE Master (FM)";
          if (rating >= 2200) return "National Master";
          if (rating >= 2000) return "Expert / Candidate Master";
          if (rating >= 1800) return "Class A — strong club";
          if (rating >= 1600) return "Class B — club player";
          if (rating >= 1400) return "Class C — intermediate";
          if (rating >= 1200) return "Class D — casual";
          return "Beginner";
        }

        function statRow(label, value) {
          return '<div class="stat-row"><span>' + label + '</span><span>' + value + "</span></div>";
        }

        function showGameReport() {
          if (!gameReportEl) return;
          var acpl = playerStats.moves ? playerStats.totalLoss / playerStats.moves : 0;
          // Average centipawn loss -> approximate strength. Elite pros average
          // ~10-20 cpl (2600+), strong club players ~50-80, beginners 150+.
          var rating = Math.round(2680 - acpl * 14);
          var mated = isInCheck(board, turn) && !allLegalMoves(board, turn).length;
          var result = mated ? (turn === "w" ? "loss" : "win") : "draw";
          if (result === "win") rating += (level === "easy" ? 20 : level === "mid" ? 45 : 70);
          else if (result === "loss") rating -= 25;
          rating = Math.max(600, Math.min(2850, rating));
          var accuracy = playerStats.moves ? Math.min(99, Math.round(100 * Math.exp(-acpl / 280))) : 100;

          reportResultEl.textContent = result === "win" ? "You beat Bekah!"
            : result === "loss" ? "Bekah wins" : "Draw";
          reportResultEl.className = "report-result " + result;
          reportRatingEl.textContent = rating;
          reportTitleEl.textContent = ratingTitle(rating);
          reportNoteEl.textContent = playerStats.moves
            ? ("Average centipawn loss " + acpl.toFixed(1) + " over " + playerStats.moves +
               " graded move" + (playerStats.moves === 1 ? "" : "s") + " — " + accuracy +
               "% accuracy. Top professionals average ~10-20.")
            : "Too few moves to grade this game.";
          reportStatsEl.innerHTML =
            statRow("Best moves", playerStats.best) +
            statRow("Good", playerStats.good) +
            statRow("Inaccuracies", playerStats.inaccuracy) +
            statRow("Mistakes", playerStats.mistake) +
            statRow("Blunders", playerStats.blunder);
          gameReportEl.hidden = false;
        }

        function hideGameReport() {
          if (gameReportEl) gameReportEl.hidden = true;
        }

        function renderGame(animateMove) {
          turnLabelEl.textContent = gameOver ? "Game over" : (turn === "w" ? "Your move" : "Bekah's move");
          matchSubtitleEl.textContent = levelLabel() + " level";
          whiteCapturesEl.innerHTML = whiteCaptures.map(function (piece) { return CAPTURE_ENTITIES[piece]; }).join("");
          blackCapturesEl.innerHTML = blackCaptures.map(function (piece) { return CAPTURE_ENTITIES[piece]; }).join("");
          renderMoveHistory();
          renderSceneState(animateMove);
        }

        function renderMoveHistory() {
          if (!history.length) {
            moveListEl.innerHTML = '<span class="move-empty">No moves yet.</span>';
            return;
          }
          var lines = [];
          for (var i = 0; i < history.length; i += 2) {
            lines.push('<div class="move-line"><span class="number">' + (i / 2 + 1) + '.</span><span>' + history[i] + '</span><span>' + (history[i + 1] || "") + "</span></div>");
          }
          moveListEl.innerHTML = lines.join("");
          moveListEl.scrollTop = moveListEl.scrollHeight;
        }

        function legalMovesForPiece(position, from) {
          var piece = position[from];
          if (!piece) return [];
          var color = colorOf(piece);
          return pseudoMovesForPiece(position, from).filter(function (move) {
            var clone = position.slice();
            applyMove(clone, move);
            return !isInCheck(clone, color);
          });
        }

        function allLegalMoves(position, color) {
          var moves = [];
          for (var i = 0; i < 64; i++) {
            if (position[i] && colorOf(position[i]) === color) moves = moves.concat(legalMovesForPiece(position, i));
          }
          return moves;
        }

        function pseudoMovesForPiece(position, from) {
          var piece = position[from];
          var color = colorOf(piece);
          var row = rowOf(from);
          var col = colOf(from);
          var type = piece.toLowerCase();
          var moves = [];

          function add(to) {
            var target = position[to];
            if (!target || colorOf(target) !== color) {
              var promotion = type === "p" && (rowOf(to) === 0 || rowOf(to) === 7) ? (color === "w" ? "Q" : "q") : null;
              moves.push({ from: from, to: to, promotion: promotion });
            }
          }

          function slide(dRow, dCol) {
            var r = row + dRow;
            var c = col + dCol;
            while (inBounds(r, c)) {
              var to = indexOf(r, c);
              if (!position[to]) moves.push({ from: from, to: to });
              else {
                if (colorOf(position[to]) !== color) moves.push({ from: from, to: to });
                break;
              }
              r += dRow;
              c += dCol;
            }
          }

          if (type === "p") {
            var direction = color === "w" ? -1 : 1;
            var startRow = color === "w" ? 6 : 1;
            var oneRow = row + direction;
            var twoRow = row + direction * 2;
            if (inBounds(oneRow, col) && !position[indexOf(oneRow, col)]) {
              add(indexOf(oneRow, col));
              if (row === startRow && !position[indexOf(twoRow, col)]) add(indexOf(twoRow, col));
            }
            [-1, 1].forEach(function (dCol) {
              var c = col + dCol;
              if (inBounds(oneRow, c)) {
                var to = indexOf(oneRow, c);
                if (position[to] && colorOf(position[to]) !== color) add(to);
              }
            });
          }

          if (type === "n") {
            [[-2, -1], [-2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2], [2, -1], [2, 1]].forEach(function (step) {
              var r = row + step[0];
              var c = col + step[1];
              if (inBounds(r, c)) add(indexOf(r, c));
            });
          }

          if (type === "b" || type === "q") {
            slide(-1, -1); slide(-1, 1); slide(1, -1); slide(1, 1);
          }

          if (type === "r" || type === "q") {
            slide(-1, 0); slide(1, 0); slide(0, -1); slide(0, 1);
          }

          if (type === "k") {
            for (var dRow = -1; dRow <= 1; dRow++) {
              for (var dCol = -1; dCol <= 1; dCol++) {
                if (dRow || dCol) {
                  var kingRow = row + dRow;
                  var kingCol = col + dCol;
                  if (inBounds(kingRow, kingCol)) add(indexOf(kingRow, kingCol));
                }
              }
            }
          }
          return moves;
        }

        function findKing(position, color) {
          return position.indexOf(color === "w" ? "K" : "k");
        }

        function isInCheck(position, color) {
          var kingIndex = findKing(position, color);
          if (kingIndex === -1) return true;
          return isSquareAttacked(position, kingIndex, enemy(color));
        }

        function isSquareAttacked(position, square, byColor) {
          for (var i = 0; i < 64; i++) {
            var piece = position[i];
            if (!piece || colorOf(piece) !== byColor) continue;
            if (attackSquares(position, i).indexOf(square) !== -1) return true;
          }
          return false;
        }

        function attackSquares(position, from) {
          var piece = position[from];
          var color = colorOf(piece);
          var row = rowOf(from);
          var col = colOf(from);
          var type = piece.toLowerCase();
          var attacks = [];

          function add(rowValue, colValue) {
            if (inBounds(rowValue, colValue)) attacks.push(indexOf(rowValue, colValue));
          }

          function slideAttack(dRow, dCol) {
            var r = row + dRow;
            var c = col + dCol;
            while (inBounds(r, c)) {
              var to = indexOf(r, c);
              attacks.push(to);
              if (position[to]) break;
              r += dRow;
              c += dCol;
            }
          }

          if (type === "p") {
            var direction = color === "w" ? -1 : 1;
            add(row + direction, col - 1);
            add(row + direction, col + 1);
          } else if (type === "n") {
            [[-2, -1], [-2, 1], [-1, -2], [-1, 2], [1, -2], [1, 2], [2, -1], [2, 1]].forEach(function (step) {
              add(row + step[0], col + step[1]);
            });
          } else if (type === "b") {
            slideAttack(-1, -1); slideAttack(-1, 1); slideAttack(1, -1); slideAttack(1, 1);
          } else if (type === "r") {
            slideAttack(-1, 0); slideAttack(1, 0); slideAttack(0, -1); slideAttack(0, 1);
          } else if (type === "q") {
            slideAttack(-1, -1); slideAttack(-1, 1); slideAttack(1, -1); slideAttack(1, 1);
            slideAttack(-1, 0); slideAttack(1, 0); slideAttack(0, -1); slideAttack(0, 1);
          } else if (type === "k") {
            for (var dRow = -1; dRow <= 1; dRow++) {
              for (var dCol = -1; dCol <= 1; dCol++) if (dRow || dCol) add(row + dRow, col + dCol);
            }
          }
          return attacks;
        }

        levelButtons.forEach(function (button) {
          button.addEventListener("click", function () {
            level = button.dataset.level;
            levelButtons.forEach(function (other) {
              var active = other === button;
              other.classList.toggle("active", active);
              other.setAttribute("aria-pressed", active ? "true" : "false");
            });
            updateStatus(levelLabel() + " level selected.");
            saveGame();
            renderGame(false);
          });
        });

        newGameButton.addEventListener("click", resetGame);
        newGameTop.addEventListener("click", resetGame);
        if (reportNewGameBtn) reportNewGameBtn.addEventListener("click", resetGame);
        flipViewButton.addEventListener("click", flipView);
        flipViewTop.addEventListener("click", flipView);
        saveGameTop.addEventListener("click", function () {
          updateStatus(saveGame() ? "Game saved. You can safely close and return later." : "Saving isn't available in this browser.");
        });
        window.addEventListener("resize", function () { resizeScene(false); });

        try {
          setupScene();
          if (!loadGame()) resetGame();
        } catch (error) {
          loadingOverlay.classList.add("hidden");
          sceneError.hidden = false;
          console.error("Knightfall Chess could not create its 3D scene.", error);
        }

        window.__chessTest = {
          setLevel: function (l) { level = l; },
          triggerHuman: function (from, to) {
            var mv = allLegalMoves(board, "w").find(function (m) { return m.from === from && m.to === to; });
            if (!mv) return false;
            pendingPlayerAnalysis = { pre: board.slice(), move: mv };
            commitMove(mv);
            afterHumanMove();
            return true;
          },
          anim: function () {
            return moveAnimation
              ? { y: +moveAnimation.object.position.y.toFixed(3), x: +moveAnimation.object.position.x.toFixed(2), dur: moveAnimation.duration }
              : null;
          },
          turn: function () { return turn; }
        };
      })();
    </script>
  </body>
</html>
